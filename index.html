<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            --bg-color: #2B2A33;
            --sidebar-bg: #1C1B22;
            --text-main: #fbfbfe;
            --text-muted: #cfcfd8;
            --accent-purple: #9462ff;
            --accent-blue: #00ddff;
            --border-gray: #3f3f44;
            --input-bg: #42414d;
            --danger: #ff5a5a;
            --sidebar-width: 210px; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBARS --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-gray);
            display: flex;
            flex-direction: column;
            padding: 15px;
            flex-shrink: 0;
        }

        .sidebar-right {
            border-right: none;
            border-left: 1px solid var(--border-gray);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }

        .input-box {
            width: 100%;
            padding: 6px 10px; 
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 4px;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
            font-size: 0.8rem;
        }

        .input-box:focus { border-color: var(--accent-purple); }

        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border-gray);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            line-height: 1.2;
        }

        /* BIGGER NOTES TEXT */
        .note-text {
            word-break: break-word;
            padding-right: 8px;
            font-size: 1.15rem; 
            font-weight: 500;
            color: var(--text-main);
        }

        .alias-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .alias-tag {
            font-size: 0.65rem;
            color: var(--accent-blue);
            font-weight: bold;
            text-transform: uppercase;
        }

        .fav-link {
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text-muted);
        }

        .fav-link:hover { color: var(--text-main); }

        .controls {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .icon-btn {
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.2s;
            user-select: none;
            opacity: 0.6;
        }

        .icon-btn:hover { opacity: 1; }
        .lock-btn.active { color: var(--accent-blue); opacity: 1; }
        .delete-btn:hover { color: var(--danger); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 18vh;
        }

        .search-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .search-bar {
            width: 100%;
            padding: 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar:focus { box-shadow: 0 0 0 2px var(--accent-purple); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Left Sidebar: Notes -->
    <aside class="sidebar">
        <input type="text" id="note-input" class="input-box" placeholder="note" autocomplete="off">
        <ul id="notes-list" class="list-container"></ul>
    </aside>

    <!-- Center: Search -->
    <main class="main-content">
        <div class="search-container">
            <form id="search-form" action="https://duckduckgo.com/" method="get">
                <input type="text" name="q" id="main-search" class="search-bar" placeholder="search" autofocus autocomplete="off">
            </form>
        </div>
    </main>

    <!-- Right Sidebar: Alias Manager -->
    <aside class="sidebar sidebar-right">
        <div class="input-group">
            <input type="text" id="alias-key" class="input-box" placeholder="key" autocomplete="off">
            <input type="text" id="alias-url" class="input-box" placeholder="url" autocomplete="off">
        </div>
        <ul id="alias-list" class="list-container"></ul>
    </aside>

    <script>
        /* --- DATA PERSISTENCE --- */
        let notes = JSON.parse(localStorage.getItem('my-notes-v5')) || [];
        let aliases = JSON.parse(localStorage.getItem('my-aliases-v5')) || {
            'g': { name: 'Gemini', url: 'https://gemini.google.com' },
            'gh': { name: 'GitHub', url: 'https://github.com' }
        };

        const noteInput = document.getElementById('note-input');
        const notesList = document.getElementById('notes-list');
        const aliasKeyInput = document.getElementById('alias-key');
        const aliasUrlInput = document.getElementById('alias-url');
        const aliasList = document.getElementById('alias-list');
        const mainSearch = document.getElementById('main-search');
        const searchForm = document.getElementById('search-form');

        /* --- SMART SEARCH --- */
        searchForm.addEventListener('submit', (e) => {
            const query = mainSearch.value.trim().toLowerCase();
            
            // Check if search bar is empty
            if (!query) {
                e.preventDefault();
                return;
            }

            // Check alias storage first
            if (aliases[query]) {
                e.preventDefault();
                window.location.href = aliases[query].url;
            } else if (query.includes('.') && !query.includes(' ')) {
                // Direct URL navigation if it looks like a domain
                e.preventDefault();
                window.location.href = query.startsWith('http') ? query : `https://${query}`;
            }
        });

        /* --- NOTES LOGIC --- */
        function renderNotes() {
            notesList.innerHTML = '';
            notes.forEach((n, i) => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <span class="note-text">${n.text}</span>
                    <div class="controls">
                        <span class="icon-btn lock-btn ${n.locked ? 'active' : ''}" onclick="toggleNoteLock(${i})">${n.locked ? '🔒' : '🔓'}</span>
                        <span class="icon-btn delete-btn" onclick="deleteNote(${i})" style="${n.locked ? 'opacity:0.1; cursor:default' : ''}">&times;</span>
                    </div>`;
                notesList.appendChild(li);
            });
        }

        function addNote() {
            const val = noteInput.value.trim();
            if (val) {
                notes.unshift({ text: val, locked: false });
                noteInput.value = '';
                saveNotes();
            }
        }

        window.toggleNoteLock = (i) => { notes[i].locked = !notes[i].locked; saveNotes(); };
        window.deleteNote = (i) => { if (!notes[i].locked) { notes.splice(i, 1); saveNotes(); } };
        
        function saveNotes() { 
            localStorage.setItem('my-notes-v5', JSON.stringify(notes)); 
            renderNotes(); 
        }

        /* --- ALIAS LOGIC --- */
        function renderAliases() {
            aliasList.innerHTML = '';
            Object.keys(aliases).forEach(key => {
                const item = aliases[key];
                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <div class="alias-info">
                        <span class="alias-tag">${key}</span>
                        <a href="${item.url}" class="fav-link" target="_blank">${item.name}</a>
                    </div>
                    <div class="controls">
                        <span class="icon-btn" onclick="editAlias('${key}')">✏️</span>
                        <span class="icon-btn delete-btn" onclick="deleteAlias('${key}')">&times;</span>
                    </div>`;
                aliasList.appendChild(li);
            });
        }

        function handleAliasSubmit(e) {
            if (e.key === 'Enter') {
                const key = aliasKeyInput.value.trim().toLowerCase();
                let url = aliasUrlInput.value.trim();
                
                if (key && url) {
                    if (!url.startsWith('http')) url = 'https://' + url;
                    const name = url.replace('https://', '').replace('www.', '').split(/[/?#]/)[0];
                    aliases[key] = { name: name.charAt(0).toUpperCase() + name.slice(1), url: url };
                    
                    aliasKeyInput.value = '';
                    aliasUrlInput.value = '';
                    saveAliases();
                }
            }
        }

        window.deleteAlias = (key) => { delete aliases[key]; saveAliases(); };
        
        window.editAlias = (key) => {
            aliasKeyInput.value = key;
            aliasUrlInput.value = aliases[key].url;
            delete aliases[key]; 
            saveAliases();
            aliasKeyInput.focus();
        };

        function saveAliases() { 
            localStorage.setItem('my-aliases-v5', JSON.stringify(aliases)); 
            renderAliases(); 
        }

        /* --- EVENT LISTENERS --- */
        noteInput.addEventListener("keydown", (e) => e.key === 'Enter' && addNote());
        aliasKeyInput.addEventListener("keydown", handleAliasSubmit);
        aliasUrlInput.addEventListener("keydown", handleAliasSubmit);

        renderNotes();
        renderAliases();
    </script>
</body>
</html>
