<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        :root {
            /* Firefox Dark Theme Palette */
            --bg-color: #2B2A33;
            --sidebar-bg: #1C1B22;
            --text-main: #fbfbfe;
            --text-muted: #cfcfd8;
            --accent-purple: #9462ff;
            --border-gray: #3f3f44;
            --input-bg: #42414d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-gray);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-label {
            color: var(--accent-purple);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #note-input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 4px;
            color: var(--text-main);
            outline: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        #note-input:focus {
            border-color: var(--accent-purple);
        }

        .notes-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .note-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-gray);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .note-text {
            word-break: break-word;
            padding-right: 10px;
        }

        .delete-btn {
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #ff5a5a;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15vh;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .main-label {
            color: var(--accent-purple);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            transition: box-shadow 0.2s ease;
            box-sizing: border-box;
        }

        .search-bar:focus {
            box-shadow: 0 0 0 2px var(--accent-purple);
        }

        .bookmarks {
            margin-top: 30px;
            display: flex;
            gap: 25px;
        }

        .bookmarks a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .bookmarks a:hover {
            color: var(--accent-purple);
            text-decoration: underline;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <span class="sidebar-label">Quick Notes</span>
        <input type="text" id="note-input" placeholder="Type and press Enter..." autocomplete="off">
        <ul id="notes-list" class="notes-list"></ul>
    </aside>

    <main class="main-content">
        <div class="search-container">
            <span class="main-label">Search the Web</span>
            <form action="https://duckduckgo.com/" method="get">
                <input type="text" name="q" class="search-bar" placeholder="Search..." autofocus autocomplete="off">
            </form>
            
            <nav class="bookmarks">
                <a href="https://github.com">GitHub</a>
                <a href="https://youtube.com">YouTube</a>
                <a href="https://reddit.com">Reddit</a>
                <a href="https://gmail.com">Mail</a>
            </nav>
        </div>
    </main>

    <script>
        const noteInput = document.getElementById('note-input');
        const notesList = document.getElementById('notes-list');

        // Initial state from LocalStorage
        let notes = JSON.parse(localStorage.getItem('my-notes')) || [];

        function renderNotes() {
            notesList.innerHTML = '';
            notes.forEach((note, index) => {
                const li = document.createElement('li');
                li.className = 'note-item';
                li.innerHTML = `
                    <span class="note-text">${note}</span>
                    <span class="delete-btn" data-index="${index}">&times;</span>
                `;
                notesList.appendChild(li);
            });
        }

        function addNote() {
            const text = noteInput.value.trim();
            if (text !== '') {
                notes.unshift(text);
                noteInput.value = '';
                saveAndRender();
            }
        }

        // Use Event Delegation for delete buttons
        notesList.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const index = e.target.getAttribute('data-index');
                notes.splice(index, 1);
                saveAndRender();
            }
        });

        function saveAndRender() {
            localStorage.setItem('my-notes', JSON.stringify(notes));
            renderNotes();
        }

        noteInput.addEventListener("keydown", (e) => {
            console.log("Key pressed:", e.key); // DEBUG LINE
            if (e.key === 'Enter') {
                console.log("Enter detected!"); // DEBUG LINE
                addNote();
            }
        });

        // Initial Render
        console.log("render notes");
        renderNotes();
    </script>
</body>
</html>
